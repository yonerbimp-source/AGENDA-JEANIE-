    .container{max-width:1180px;margin:auto;padding:12px}.header{display:grid;grid-template-columns:1.8fr 1fr;gap:12px;margin-bottom:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow)}

    .topline,.line{display:flex;justify-content:space-between;gap:10px;align-items:center}.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .btn{border:none;background:var(--primary);color:#fff;padding:10px 13px;border-radius:10px;cursor:pointer;font-weight:700}.btn:hover{background:var(--primary-dark)}
    .btn.secondary{background:var(--secondary)}.btn.delete{background:var(--danger)}.btn.small{padding:7px 10px;font-size:12px}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab-btn{border:none;background:var(--tab);color:var(--text);padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700}.tab-btn.active{background:var(--primary);color:#fff}
    .tab-content{display:none}.tab-content.active{display:block}.grid-main{display:grid;grid-template-columns:340px 1fr;gap:12px}.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .big-number{font-size:38px;font-weight:800}.progress-wrap,.mini-bar{background:#d8d8d8;border-radius:999px;overflow:hidden} body.theme-redblack .progress-wrap,body.theme-redblack .mini-bar,body.theme-multicolor .progress-wrap,body.theme-multicolor .mini-bar{background:#2e3238}
    .progress-wrap{height:14px;margin-top:8px}.progress-bar,.mini-fill{height:100%;transition:width .2s ease}.progress-bar{width:0;background:var(--primary)}
    .task{border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:9px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.task-left{display:flex;gap:10px;align-items:flex-start;flex:1}
    .badge{display:inline-block;background:var(--badge);padding:4px 8px;border-radius:999px;font-size:11px;margin-right:5px;margin-top:6px}.badge-ok{background:rgba(46,182,125,.14);color:var(--good)}.badge-recurring{font-weight:700}.done{text-decoration:line-through;opacity:.65}

    .day-item,.category-item{border:1px solid var(--border);border-radius:14px;padding:11px}.status{min-height:18px;margin-top:8px;font-size:13px;color:var(--primary)}

</div>

function getLocalDateString(dateObj = new Date()) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth() + 1).padStart(2, '0');
  const d = String(dateObj.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function parseDate(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  return new Date(y,m-1,d,12,0,0,0);
}
function compareDates(a,b){return parseDate(a).getTime()-parseDate(b).getTime();}
function dateBelongsToMonth(dateStr,monthValue){return dateStr.startsWith(monthValue);}
function weekday(dateStr){return parseDate(dateStr).getDay();}
function yearOf(dateStr){return Number(dateStr.slice(0,4));}

function normalizeTask(task){
  const normalized={...task};
  normalized.recurring = normalized.recurring && normalized.recurring.type && normalized.recurring.type!=='none'
    ? {type: normalized.recurring.type,days: Array.isArray(normalized.recurring.days) ? normalized.recurring.days.map(Number) : []}
    : null;
  normalized.recurringDoneDates = normalized.recurringDoneDates || {};
  normalized.recurringExcludedDates = Array.isArray(normalized.recurringExcludedDates) ? normalized.recurringExcludedDates : [];
  normalized.recurringInProgressDates = normalized.recurringInProgressDates || {};
  if(!normalized.status) normalized.status = normalized.done ? 'done' : 'pending';
  return normalized;
}

function isRecurringTask(task){return !!task.recurring;}
function createVirtualRecurringTask(task,dateStr){return {...task,virtualId:`${task.id}__${dateStr}`,instanceDate:dateStr,date:dateStr,status:(task.recurringDoneDates&&task.recurringDoneDates[dateStr])?'done':((task.recurringInProgressDates&&task.recurringInProgressDates[dateStr])?'in_progress':'pending'),done:!!(task.recurringDoneDates&&task.recurringDoneDates[dateStr]),recurringBase:true};}
function matchesRecurringTaskOnDate(task,dateStr){
  if(!isRecurringTask(task)) return false;
  if(compareDates(dateStr,task.date)<0) return false;
  if(yearOf(dateStr)!==yearOf(task.date)) return false;
  if(task.recurringExcludedDates.includes(dateStr)) return false;
  if(task.recurring.type==='daily') return true;
  if(task.recurring.type==='weekly') return weekday(dateStr)===weekday(task.date);
  if(task.recurring.type==='monthly') return Number(dateStr.slice(-2))===Number(task.date.slice(-2));
  if(task.recurring.type==='specific') return task.recurring.days.includes(weekday(dateStr));
  return false;
}
function getTasksForDate(dateStr){
  const list=[];
  state.tasks.forEach(task=>{
    if(isRecurringTask(task)){if(matchesRecurringTaskOnDate(task,dateStr)){list.push(createVirtualRecurringTask(task,dateStr));}}
    else if(task.date===dateStr){list.push({...task,instanceDate:task.date,virtualId:task.id});}
  });
  return list;
}
function getTasksForMonth(monthValue){
  const [year,month]=monthValue.split('-').map(Number);
  const totalDays=new Date(year,month,0).getDate();
  let all=[];
  for(let day=1; day<=totalDays; day++){
    const dateStr=`${monthValue}-${String(day).padStart(2,'0')}`;
    all=all.concat(getTasksForDate(dateStr));
  }
  return all;
}
function sortTasksByTime(tasks){
  const withTime=tasks.filter(task=>task.timeFrom).sort((a,b)=>{const timeCompare=(a.timeFrom||'').localeCompare(b.timeFrom||''); if(timeCompare!==0) return timeCompare; return String(a.createdAt||'').localeCompare(String(b.createdAt||''));});
  const withoutTime=tasks.filter(task=>!task.timeFrom);
  return [...withTime,...withoutTime];
}

function getTaskStatus(task){
  if(task.status==='in_progress') return 'in_progress';
  if(task.status==='done' || task.done) return 'done';
  return 'pending';
}

  state.tasks.unshift(normalizeTask({id:Date.now().toString()+Math.random().toString(16).slice(2),...payload,status:'pending',done:false,createdAt:new Date().toISOString(),completedAt:null,recurringDoneDates:{},recurringExcludedDates:[]}));
  persist(); clearMainForm(); renderAll(); setStatus(tr().taskSaved);

function cycleTaskStatus(id,instanceDate=''){
  state.tasks=state.tasks.map(task=>{
    if(task.id!==id) return task;
    if(isRecurringTask(task) && instanceDate){
      const next={...task,recurringDoneDates:{...task.recurringDoneDates},recurringInProgressDates:{...(task.recurringInProgressDates||{})}};
      const current = next.recurringDoneDates[instanceDate] ? 'done' : (next.recurringInProgressDates[instanceDate] ? 'in_progress' : 'pending');
      if(current==='pending'){
        next.recurringInProgressDates[instanceDate]=true;
        delete next.recurringDoneDates[instanceDate];
      } else if(current==='in_progress'){
        next.recurringDoneDates[instanceDate]=true;
        delete next.recurringInProgressDates[instanceDate];
      } else {
        delete next.recurringDoneDates[instanceDate];
        delete next.recurringInProgressDates[instanceDate];
      }
      return next;
    }
    const current=getTaskStatus(task);
    if(current==='pending') return {...task,status:'in_progress',done:false,completedAt:null};
    if(current==='in_progress') return {...task,status:'done',done:true,completedAt:new Date().toISOString()};
    return {...task,status:'pending',done:false,completedAt:null};
  });
  persist(); renderAll();
}

function toggleTask(id,instanceDate=''){
  state.tasks=state.tasks.map(task=>{
    if(task.id!==id) return task;
    if(isRecurringTask(task) && instanceDate){
      const next={...task,recurringDoneDates:{...task.recurringDoneDates}};
      next.recurringDoneDates[instanceDate]=!next.recurringDoneDates[instanceDate];
      if(!next.recurringDoneDates[instanceDate]) delete next.recurringDoneDates[instanceDate];
      return next;
    }
    return {...task,done:!task.done,completedAt:!task.done?new Date().toISOString():null};
  });
  persist(); renderAll();
}
function deleteTask(id,instanceDate=''){
  const task=state.tasks.find(t=>t.id===id);
  if(!task) return;
  if(isRecurringTask(task) && instanceDate){
    const choice=prompt(tr().deleteRecurringPrompt,'1');
    if(choice===null) return;
    if(choice==='1'){
      state.tasks=state.tasks.map(t=>{
        if(t.id!==id) return t;
        const excluded = t.recurringExcludedDates.includes(instanceDate) ? t.recurringExcludedDates : [...t.recurringExcludedDates,instanceDate];
        const doneDates={...t.recurringDoneDates}; delete doneDates[instanceDate];
        return {...t,recurringExcludedDates:excluded,recurringDoneDates:doneDates};
      });
    } else if(choice==='2'){state.tasks=state.tasks.filter(t=>t.id!==id);}
    else {return alert(tr().invalidRecurringChoice);}
  } else {state.tasks=state.tasks.filter(t=>t.id!==id);}
  persist(); renderAll();
}

function moveTask(id,instanceDate=''){

  if(!task) return;
  if(isRecurringTask(task) && instanceDate){
    const choice=prompt(tr().moveRecurringPrompt,'1');
    if(choice===null) return;

      const newDate=prompt(tr().chooseDateMove,instanceDate);
      if(!newDate) return;

        if(t.id!==id) return t;
        const excluded = t.recurringExcludedDates.includes(instanceDate) ? t.recurringExcludedDates : [...t.recurringExcludedDates,instanceDate];
        const doneDates={...t.recurringDoneDates}; delete doneDates[instanceDate];
        return {...t,recurringExcludedDates:excluded,recurringDoneDates:doneDates};
      });
      state.tasks.unshift(normalizeTask({id:Date.now().toString()+Math.random().toString(16).slice(2),title:task.title,category:task.category,date:newDate,timeFrom:task.timeFrom||'',timeTo:task.timeTo||'',note:task.note||'',recurring:null,status:'pending',done:false,createdAt:new Date().toISOString(),completedAt:null,recurringDoneDates:{},recurringExcludedDates:[]}));

function saveBackup(){

  a.download='agenda_universal_backup_'+getLocalDateString()+'.json';
  document.body.appendChild(a);
  a.click();
  a.remove();

function restoreBackup(file){

  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(Array.isArray(parsed)){state.tasks=parsed.map(normalizeTask);}
      else {
        if(Array.isArray(parsed.tasks)) state.tasks=parsed.tasks.map(normalizeTask);
        if(parsed.settings) state.settings={...state.settings,...parsed.settings};
        if(parsed.agendaFilters) state.agendaFilters={...state.agendaFilters,...parsed.agendaFilters};
      }
      persist(); persistAgendaFilters(); applyTheme(); applyTexts(); syncAgendaFilterUI(); renderAll(); setStatus(tr().backupRestored);
    }catch{setStatus(tr().backupError,true);}
    finally {els.restoreFileInput.value='';}
  };
  reader.readAsText(file);
}
function agendaMonthValue(){return els.agendaMonthInput.value||todayISO.slice(0,7);}
function renderMonthlyAgenda(){
  const monthValue=agendaMonthValue();
  const allTasks=getTasksForMonth(monthValue);
  const grouped={};
  allTasks.forEach(task=>{grouped[task.date] ||= []; grouped[task.date].push(task);});
  Object.keys(grouped).forEach(date=>{grouped[date]=sortTasksByTime(grouped[date]);});

  const mode=state.agendaFilters.mode;
  const singleDate=state.agendaFilters.singleDate || todayISO;
  const [year,month]=monthValue.split('-').map(Number);
  const totalDays=new Date(year,month,0).getDate();
  let daysToShow=[];

  if(mode==='single'){daysToShow=dateBelongsToMonth(singleDate,monthValue)?[singleDate]:[];}
  else if(mode==='withTasks'){daysToShow=Object.keys(grouped).sort((a,b)=>a.localeCompare(b));}
  else if(mode==='pending'){daysToShow=Array.from({length:totalDays},(_,i)=>`${monthValue}-${String(i+1).padStart(2,'0')}`).filter(dateStr=>(grouped[dateStr]||[]).some(task=>!task.done));}
  else if(mode==='completed'){daysToShow=Array.from({length:totalDays},(_,i)=>`${monthValue}-${String(i+1).padStart(2,'0')}`).filter(dateStr=>(grouped[dateStr]||[]).some(task=>task.done));}
  else {daysToShow=Array.from({length:totalDays},(_,i)=>`${monthValue}-${String(i+1).padStart(2,'0')}`);}

  let html='';
  daysToShow.forEach(dateStr=>{
    let dayTasks=(grouped[dateStr]||[]);
    if(mode==='pending') dayTasks=dayTasks.filter(task=>!task.done);
    else if(mode==='completed') dayTasks=dayTasks.filter(task=>task.done);

    if(agendaSearchText){
      dayTasks=dayTasks.filter(task=>{
        const title=(task.title||'').toLowerCase();
        const note=(task.note||'').toLowerCase();
        const category=(task.category||'').toLowerCase();
        return title.includes(agendaSearchText) || note.includes(agendaSearchText) || category.includes(agendaSearchText);
      });
    }

    const dayNumber=Number(dateStr.slice(-2));
    html+=`<div class="month-day-block"><div class="month-day-title">${tr().dayLabel} ${dayNumber} • ${escapeHtml(dateStr)}</div>`;
    if(!dayTasks.length){html+=`<div class="day-empty">${tr().noTaskDay}</div>`;}
    else {html+=dayTasks.map(task=>renderTaskCard(task,'month')).join('');}
    html+=`</div>`;
  });

  els.monthlyAgendaList.innerHTML=html||`<div class="empty">${tr().noTasks}</div>`;
}
function renderToday(){
  const list=sortTasksByTime(getTasksForDate(getLocalDateString()));
  if(!list.length){els.todayList.innerHTML=`<div class="empty">${tr().noTodayTasks}</div>`; return;}
  els.todayList.innerHTML=list.map(task=>renderTaskCard(task,'today')).join('');
}
function renderSummary(){
  const month=els.monthInput.value;
  const monthTasks=getTasksForMonth(month);
  const done=monthTasks.filter(t=>t.done).length;
  const pending=monthTasks.filter(t=>!t.done).length;
  const total=monthTasks.length;
  const rate=total?Math.round(done*100/total):0;
  els.completionRate.textContent=rate+'%';
  els.completionText.textContent=`${done} ${tr().of} ${total} ${tr().completedText}`;
  els.mainProgress.style.width=rate+'%';
  const categories={};
  monthTasks.forEach(task=>{categories[task.category] ||= {total:0,done:0}; categories[task.category].total++; if(task.done) categories[task.category].done++;});
  const colors=['#2eb67d','#d14d8b','#f59e0b','#8b5cf6','#14b8a6','#ef476f'];
  const entries=Object.entries(categories);
  els.categorySummary.innerHTML=!entries.length?`<div class="empty">${tr().noCategories}</div>`:entries.map(([name,val],i)=>{const percent=val.total?Math.round(val.done*100/val.total):0; return `<div class="category-item"><div class="line"><div><strong>${escapeHtml(name)}</strong><br><span class="muted">${val.done} ${tr().of} ${val.total}</span></div><strong>${percent}%</strong></div><div class="mini-bar"><div class="mini-fill" style="width:${percent}%;background:${colors[i%colors.length]}"></div></div></div>`;}).join('');
  const days={};
  monthTasks.forEach(task=>{days[task.date] ||= {total:0,done:0}; days[task.date].total++; if(task.done) days[task.date].done++;});
  const dayEntries=Object.entries(days).sort((a,b)=>a[0].localeCompare(b[0]));
  els.dailySummary.innerHTML=!dayEntries.length?`<div class="empty">${tr().noDailyResults}</div>`:dayEntries.map(([date,val])=>{const percent=val.total?Math.round(val.done*100/val.total):0; const color=percent>=80?'var(--good)':percent>=50?'var(--warn)':'var(--danger)'; return `<div class="day-item"><div class="line"><strong>${escapeHtml(date)}</strong><span class="muted">${val.done}/${val.total}</span></div><div class="mini-bar"><div class="mini-fill" style="width:${percent}%;background:${color}"></div></div><div class="muted" style="margin-top:6px">${tr().compliance}: ${percent}%</div></div>`;}).join('');
  drawPie(done,pending);
}
function drawPie(done,pending){
  const ctx=els.pieChart.getContext('2d');
  ctx.clearRect(0,0,els.pieChart.width,els.pieChart.height);
  const total=done+pending;
  if(!total){ctx.fillStyle=getCss('--muted'); ctx.font='15px Arial'; ctx.fillText(tr().noMonthData,80,120); return;}
  const cx=105,cy=110,r=72;
  let start=-Math.PI/2;
  [{label:tr().donePlural,value:done,color:getCss('--good')},{label:tr().pending,value:pending,color:getCss('--danger')}].filter(s=>s.value>0).forEach(slice=>{
    const angle=(slice.value/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+angle); ctx.closePath(); ctx.fillStyle=slice.color; ctx.fill(); start+=angle;
  });
  ctx.fillStyle=getCss('--text'); ctx.font='bold 15px Arial'; ctx.fillText(`${tr().total}: ${total}`,78,115);
  ctx.fillStyle=getCss('--good'); ctx.fillRect(215,66,16,16); ctx.fillStyle=getCss('--text'); ctx.font='13px Arial'; ctx.fillText(`${tr().donePlural}: ${done}`,238,79);
  ctx.fillStyle=getCss('--danger'); ctx.fillRect(215,100,16,16); ctx.fillStyle=getCss('--text'); ctx.fillText(`${tr().pending}: ${pending}`,238,113);
}
function getCss(v){return getComputedStyle(document.body).getPropertyValue(v).trim()||getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function escapeHtml(text){return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

function timesOverlap(startA,endA,startB,endB){
  if(!startA || !endA || !startB || !endB) return false;
  if(isOvernight(startA,endA) || isOvernight(startB,endB)) return false;
  const a1=startA, a2=endA, b1=startB, b2=endB;
  return a1 < b2 && b1 < a2;
}
function hasTimeConflictOnDate(dateStr, taskToPlace){
  return state.tasks.some(task=>{
    if(isRecurringTask(task)) return false;
    if(task.id===taskToPlace.id) return false;
    if(task.date!==dateStr) return false;
    if(!task.timeFrom || !task.timeTo || !taskToPlace.timeFrom || !taskToPlace.timeTo) return false;
    return timesOverlap(task.timeFrom, task.timeTo, taskToPlace.timeFrom, taskToPlace.timeTo);
  });
}
function movePendingTasksForwardForDate(dateStr){
  let changed=false;
  state.tasks=state.tasks.map(task=>{
    if(isRecurringTask(task)) return task;
    if(task.done || task.status==='done') return task;
    if(task.date!==dateStr) return task;
    const current = parseDate(task.date);
    current.setDate(current.getDate()+1);
    const nextDate = getLocalDateString(current);
    let nextTask={...task,date:nextDate};
    if(hasTimeConflictOnDate(nextDate, nextTask)){
      nextTask={...nextTask,timeFrom:'',timeTo:''};
    }
    changed=true;
    return nextTask;
  });
  if(changed) persist();
}
function runDailyRolloverIfNeeded(){
  const today = getLocalDateString();
  const lastChecked = localStorage.getItem(LAST_ROLLOVER_CHECK_KEY);
  if(!lastChecked){
    localStorage.setItem(LAST_ROLLOVER_CHECK_KEY, today);
    return;
  }
  if(lastChecked===today) return;

  let cursor = parseDate(lastChecked);
  const todayDate = parseDate(today);
  while(cursor.getTime() < todayDate.getTime()){
    const dayStr = getLocalDateString(cursor);
    movePendingTasksForwardForDate(dayStr);
    cursor.setDate(cursor.getDate()+1);
  }
  localStorage.setItem(LAST_ROLLOVER_CHECK_KEY, today);
}

function renderAll(){renderMonthlyAgenda(); renderToday(); renderSummary();}

document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');}));
els.languageSelect.addEventListener('change',()=>{state.settings.language=els.languageSelect.value; persist(); applyTexts(); clearMainForm(); syncAgendaFilterUI(); renderAll();});
els.themeSelect.addEventListener('change',()=>{state.settings.theme=els.themeSelect.value; persist(); applyTheme(); renderAll();});
els.saveTaskBtn.addEventListener('click',addTask);
els.saveBackupBtn.addEventListener('click',saveBackup);
els.restoreBackupBtn.addEventListener('click',()=>els.restoreFileInput.click());
els.restoreFileInput.addEventListener('change',e=>{const file=e.target.files&&e.target.files[0]; if(file) restoreBackup(file);});
els.agendaMonthInput.addEventListener('change',renderMonthlyAgenda);
els.monthInput.addEventListener('change',renderSummary);
els.agendaSearchInput.addEventListener('input',()=>{agendaSearchText=(els.agendaSearchInput.value||'').toLowerCase().trim(); renderMonthlyAgenda();});
els.agendaFilterSelect.addEventListener('change',()=>{state.agendaFilters.mode=els.agendaFilterSelect.value; if(state.agendaFilters.mode==='single' && !state.agendaFilters.singleDate){state.agendaFilters.singleDate=todayISO;} persistAgendaFilters(); syncAgendaFilterUI(); renderMonthlyAgenda();});
els.agendaSingleDateInput.addEventListener('change',()=>{state.agendaFilters.singleDate=els.agendaSingleDateInput.value || todayISO; persistAgendaFilters(); renderMonthlyAgenda();});
els.repeatTypeInput.addEventListener('change',()=>updateRepeatHelp('main'));
els.editRepeatTypeInput.addEventListener('change',()=>updateRepeatHelp('edit'));
els.repeatDaysButtons.querySelectorAll('.day-chip').forEach(btn=>{btn.addEventListener('click',()=>btn.classList.toggle('active'));});
els.editRepeatDaysButtons.querySelectorAll('.day-chip').forEach(btn=>{btn.addEventListener('click',()=>btn.classList.toggle('active'));});
els.cancelEditBtn.addEventListener('click',closeEdit);
els.updateTaskBtn.addEventListener('click',updateTask);
els.editModalBackdrop.addEventListener('click',e=>{if(e.target===els.editModalBackdrop) closeEdit();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault(); deferredPrompt=e; els.installBtn.style.display='inline-block'; els.installBox.classList.add('show');});
els.installBtn.addEventListener('click',async()=>{if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; els.installBtn.style.display='none'; els.installBox.classList.remove('show');});
window.toggleTask=toggleTask;
window.deleteTask=deleteTask;
window.openEdit=openEdit;
window.repeatTask=repeatTask;
window.moveTask=moveTask;
window.cycleTaskStatus=cycleTaskStatus;

load();
runDailyRolloverIfNeeded();
els.dateInput.value=todayISO;
els.monthInput.value=todayISO.slice(0,7);
els.agendaMonthInput.value=todayISO.slice(0,7);
applyTheme();
applyTexts();
syncAgendaFilterUI();
clearMainForm();
renderAll();
</script>
