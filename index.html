<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Universal PWA</title>
  <meta name="theme-color" content="#d14d8b">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <style>
    :root{--bg:#fff7fb;--text:#35242f;--muted:#7b5f6f;--card:#ffffff;--border:#f0d3e2;--shadow:0 8px 24px rgba(170,60,110,.12);--primary:#d14d8b;--primary-dark:#b23f74;--secondary:#2eb67d;--good:#2eb67d;--warn:#f59e0b;--danger:#ef476f;--tab:#f9dbe9;--badge:#f8edf4}
    body.theme-redblack{--bg:#111214;--text:#f5f5f5;--muted:#b8b8b8;--card:#1b1d20;--border:#2b2d31;--shadow:0 8px 24px rgba(0,0,0,.28);--primary:#d62839;--primary-dark:#b71f2f;--secondary:#2e2f33;--good:#22c55e;--warn:#f59e0b;--danger:#ef4444;--tab:#23262a;--badge:#2a2d31}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
    .container{max-width:1180px;margin:auto;padding:12px}.header{display:grid;grid-template-columns:1.8fr 1fr;gap:12px;margin-bottom:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
    h1,h2,h3{margin:0 0 8px 0} h1{font-size:24px} h2{font-size:18px} h3{font-size:16px}.muted{color:var(--muted)}
    .topline,.line{display:flex;justify-content:space-between;gap:10px;align-items:center}.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .btn{border:none;background:var(--primary);color:#fff;padding:10px 13px;border-radius:10px;cursor:pointer;font-weight:700}.btn:hover{background:var(--primary-dark)}
    .btn.secondary{background:var(--secondary)}.btn.delete{background:var(--danger)}.btn.small{padding:7px 10px;font-size:12px}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}.select,.input,.textarea{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);margin-top:5px;margin-bottom:9px}.textarea{min-height:72px;resize:vertical}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab-btn{border:none;background:var(--tab);color:var(--text);padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700}.tab-btn.active{background:var(--primary);color:#fff}
    .tab-content{display:none}.tab-content.active{display:block}.grid-main{display:grid;grid-template-columns:340px 1fr;gap:12px}.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .big-number{font-size:38px;font-weight:800}.progress-wrap,.mini-bar{background:#d8d8d8;border-radius:999px;overflow:hidden} body.theme-redblack .progress-wrap,body.theme-redblack .mini-bar{background:#2e3238}
    .progress-wrap{height:14px;margin-top:8px}.progress-bar,.mini-fill{height:100%;transition:width .2s ease}.progress-bar{width:0;background:var(--primary)}
    .task{border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:9px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.task-left{display:flex;gap:10px;align-items:flex-start;flex:1}
    .badge{display:inline-block;background:var(--badge);padding:4px 8px;border-radius:999px;font-size:11px;margin-right:5px;margin-top:6px}.badge-ok{background:rgba(46,182,125,.14);color:var(--good)}.done{text-decoration:line-through;opacity:.65}
    .empty{border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;color:var(--muted)}.days-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
    .day-item,.category-item{border:1px solid var(--border);border-radius:14px;padding:11px}.status{min-height:18px;margin-top:8px;font-size:13px;color:var(--primary)}
    .install-box{display:none;margin-top:8px;padding:10px;border:1px dashed var(--border);border-radius:12px}.install-box.show{display:block} canvas{max-width:100%}
    .task-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal-backdrop.show{display:flex}
    .modal{max-width:520px;width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
    .month-day-block{border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px}.month-day-title{font-weight:800;margin-bottom:8px}.day-empty{padding:10px 12px;border:1px dashed var(--border);border-radius:12px;color:var(--muted)}
    .day-task-card{border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;gap:10px}
    @media (max-width:900px){.header,.grid-main,.summary-grid{grid-template-columns:1fr}.task,.day-task-card{flex-direction:column}.container{padding:10px}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="card">
      <div class="topline">
        <div>
          <h1 id="mainTitle"></h1>
          <div class="muted" id="mainSubtitle"></div>
        </div>
        <div class="controls">
          <select id="languageSelect" class="select" style="width:auto;margin:0">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
          <select id="themeSelect" class="select" style="width:auto;margin:0">
            <option value="pinkgreen">Rosado + Verde</option>
            <option value="redblack">Rojo + Negro</option>
          </select>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn" id="installBtn" style="display:none"></button>
        <button class="btn secondary" id="saveBackupBtn"></button>
        <button class="btn secondary" id="restoreBackupBtn"></button>
        <input type="file" id="restoreFileInput" accept=".json,application/json" style="display:none">
      </div>
      <div class="install-box" id="installBox"></div>
      <div class="status" id="statusText"></div>
    </div>
    <div class="card">
      <h3 id="monthCompletionTitle"></h3>
      <div class="big-number" id="completionRate">0%</div>
      <div class="progress-wrap"><div class="progress-bar" id="mainProgress"></div></div>
      <div class="muted" id="completionText"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="agenda" id="tabAgenda"></button>
    <button class="tab-btn" data-tab="today" id="tabToday"></button>
    <button class="tab-btn" data-tab="summary" id="tabSummary"></button>
  </div>

  <div class="tab-content active" id="agenda">
    <div class="grid-main">
      <div class="card">
        <h2 id="newTaskTitle"></h2>
        <label id="labelTitle"></label>
        <input id="titleInput" class="input">
        <label id="labelCategory"></label>
        <select id="categoryInput" class="select"></select>
        <div class="line">
          <div style="flex:1">
            <label id="labelDate"></label>
            <input id="dateInput" type="date" class="input">
          </div>
          <div style="width:48%">
            <label id="labelTimeFrom"></label>
            <input id="timeFromInput" type="time" class="input">
          </div>
        </div>
        <div>
          <label id="labelTimeTo"></label>
          <input id="timeToInput" type="time" class="input">
        </div>
        <label id="labelNote"></label>
        <textarea id="noteInput" class="textarea"></textarea>
        <button class="btn" id="saveTaskBtn"></button>
      </div>
      <div class="card">
        <div class="line">
          <h2 id="allTasksTitle"></h2>
          <input id="agendaMonthInput" type="month" class="input" style="width:auto;margin:0">
        </div>
        <div id="monthlyAgendaList"></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="today">
    <div class="card">
      <h2 id="todayTasksTitle"></h2>
      <div id="todayList"></div>
    </div>
  </div>

  <div class="tab-content" id="summary">
    <div class="card">
      <h2 id="monthSummaryTitle"></h2>
      <label id="labelSelectMonth"></label>
      <input id="monthInput" type="month" class="input">
    </div>
    <div class="summary-grid">
      <div class="card">
        <h3 id="overallStatusTitle"></h3>
        <canvas id="pieChart" width="340" height="240"></canvas>
      </div>
      <div class="card">
        <h3 id="categoryProgressTitle"></h3>
        <div id="categorySummary"></div>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <h3 id="dailyResultsTitle"></h3>
      <div id="dailySummary" class="days-grid"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="editModalBackdrop">
  <div class="modal">
    <h2 id="editTaskTitle"></h2>
    <label id="editLabelTitle"></label>
    <input id="editTitleInput" class="input">
    <label id="editLabelCategory"></label>
    <select id="editCategoryInput" class="select"></select>
    <div class="line">
      <div style="flex:1">
        <label id="editLabelDate"></label>
        <input id="editDateInput" type="date" class="input">
      </div>
      <div style="width:48%">
        <label id="editLabelTimeFrom"></label>
        <input id="editTimeFromInput" type="time" class="input">
      </div>
    </div>
    <label id="editLabelTimeTo"></label>
    <input id="editTimeToInput" type="time" class="input">
    <label id="editLabelNote"></label>
    <textarea id="editNoteInput" class="textarea"></textarea>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelEditBtn"></button>
      <button class="btn" id="updateTaskBtn"></button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='agenda_universal_pwa_v4';
const SETTINGS_KEY='agenda_universal_pwa_settings_v4';
const I18N={
  es:{title:'Agenda y seguimiento de progreso',subtitle:'Organiza tareas, horas, progreso mensual y muévelas sin dañar tu programa.',install:'Instalar app',installHelp:'Puedes instalar esta app en tu teléfono o computadora.',saveBackup:'Guardar respaldo',restoreBackup:'Restaurar respaldo',monthCompletion:'Cumplimiento del mes',agenda:'Agenda',today:'Hoy',summary:'Resumen mensual',newTask:'Nueva tarea',taskTitle:'Título',category:'Categoría',date:'Fecha',timeFrom:'Hora inicio',timeTo:'Hora fin',note:'Nota',saveTask:'Guardar tarea',updateTask:'Actualizar tarea',cancel:'Cancelar',allTasks:'Agenda del mes',todayTasks:'Tareas de hoy',monthSummary:'Resumen del mes',selectMonth:'Selecciona mes',overallStatus:'Estado general',categoryProgress:'Progreso por categoría',dailyResults:'Resultado diario del mes',noTasks:'Aún no has agregado tareas.',noTodayTasks:'Hoy no tienes tareas.',noMonthData:'No hay datos en este mes.',noCategories:'No hay categorías para mostrar.',noDailyResults:'Aún no hay resultados diarios.',noTaskDay:'Sin tarea',completed:'Completada',markDone:'Marcar hecha',unmark:'Desmarcar',edit:'Editar',repeat:'Repetir',move:'Mover',delete:'Borrar',chooseDateMove:'Elige una nueva fecha para mover esta tarea:',chooseDateRepeat:'Elige la fecha para repetir esta tarea:',writeTitle:'Escribe un título para la tarea.',invalidTime:'La hora final no puede ser igual a la hora inicial.',overnight:'Cruza al próximo día',taskSaved:'Tarea guardada correctamente.',taskUpdated:'Tarea actualizada.',taskMoved:'Tarea movida a otra fecha.',taskRepeated:'Tarea repetida en otra fecha.',backupSaved:'Respaldo guardado correctamente.',backupRestored:'Respaldo restaurado correctamente.',backupError:'No se pudo restaurar el archivo.',completedText:'tareas completadas',of:'de',compliance:'Cumplimiento',total:'Total',pending:'Pendientes',donePlural:'Completadas',dayLabel:'Día',categories:['Trabajo','Casa','Personal','Salud','Negocio','Iglesia']},
  en:{title:'Agenda and progress tracking',subtitle:'Organize tasks, time slots, monthly progress, and move them without breaking your program.',install:'Install app',installHelp:'You can install this app on your phone or computer.',saveBackup:'Save backup',restoreBackup:'Restore backup',monthCompletion:'Monthly completion',agenda:'Agenda',today:'Today',summary:'Monthly summary',newTask:'New task',taskTitle:'Title',category:'Category',date:'Date',timeFrom:'Start time',timeTo:'End time',note:'Note',saveTask:'Save task',updateTask:'Update task',cancel:'Cancel',allTasks:'Month agenda',todayTasks:"Today's tasks",monthSummary:'Month summary',selectMonth:'Select month',overallStatus:'Overall status',categoryProgress:'Progress by category',dailyResults:'Daily results for the month',noTasks:'You have not added tasks yet.',noTodayTasks:'You have no tasks for today.',noMonthData:'No data for this month.',noCategories:'No categories to show.',noDailyResults:'There are no daily results yet.',noTaskDay:'No task',completed:'Completed',markDone:'Mark done',unmark:'Unmark',edit:'Edit',repeat:'Repeat',move:'Move',delete:'Delete',chooseDateMove:'Choose a new date to move this task:',chooseDateRepeat:'Choose the date to repeat this task:',writeTitle:'Write a title for the task.',invalidTime:'End time cannot be the same as start time.',overnight:'Crosses into next day',taskSaved:'Task saved successfully.',taskUpdated:'Task updated.',taskMoved:'Task moved to another date.',taskRepeated:'Task repeated on another date.',backupSaved:'Backup saved successfully.',backupRestored:'Backup restored successfully.',backupError:'Could not restore the file.',completedText:'tasks completed',of:'of',compliance:'Completion',total:'Total',pending:'Pending',donePlural:'Completed',dayLabel:'Day',categories:['Work','Home','Personal','Health','Business','Church']}
};
const todayISO=new Date().toISOString().split('T')[0];
let state={tasks:[],settings:{language:'es',theme:'pinkgreen'}};
let deferredPrompt=null, editingId=null;
const els={};
['mainTitle','mainSubtitle','installBtn','saveBackupBtn','restoreBackupBtn','restoreFileInput','installBox','statusText','monthCompletionTitle','completionRate','mainProgress','completionText','tabAgenda','tabToday','tabSummary','newTaskTitle','labelTitle','labelCategory','labelDate','labelTimeFrom','labelTimeTo','labelNote','titleInput','categoryInput','dateInput','timeFromInput','timeToInput','noteInput','saveTaskBtn','allTasksTitle','agendaMonthInput','monthlyAgendaList','todayTasksTitle','todayList','monthSummaryTitle','labelSelectMonth','monthInput','overallStatusTitle','categoryProgressTitle','dailyResultsTitle','categorySummary','dailySummary','pieChart','languageSelect','themeSelect','editModalBackdrop','editTaskTitle','editLabelTitle','editLabelCategory','editLabelDate','editLabelTimeFrom','editLabelTimeTo','editLabelNote','editTitleInput','editCategoryInput','editDateInput','editTimeFromInput','editTimeToInput','editNoteInput','cancelEditBtn','updateTaskBtn'].forEach(id=>els[id]=document.getElementById(id));
const tr=()=>I18N[state.settings.language];

function load(){try{const tasks=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); if(Array.isArray(tasks)) state.tasks=tasks;}catch{} try{const settings=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'); state.settings={...state.settings,...settings};}catch{}}
function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.tasks)); localStorage.setItem(SETTINGS_KEY,JSON.stringify(state.settings));}
function setStatus(msg,err=false){els.statusText.textContent=msg||''; els.statusText.style.color=err?'var(--danger)':'var(--primary)';}
function applyTheme(){document.body.classList.toggle('theme-redblack',state.settings.theme==='redblack'); els.themeSelect.value=state.settings.theme;}
function fillCategories(selectEl){selectEl.innerHTML=tr().categories.map(c=>`<option>${c}</option>`).join('');}
function applyTexts(){
  document.documentElement.lang=state.settings.language; document.title=tr().title;
  els.mainTitle.textContent=tr().title; els.mainSubtitle.textContent=tr().subtitle; els.installBtn.textContent=tr().install;
  els.saveBackupBtn.textContent=tr().saveBackup; els.restoreBackupBtn.textContent=tr().restoreBackup; els.installBox.textContent=tr().installHelp;
  els.monthCompletionTitle.textContent=tr().monthCompletion; els.tabAgenda.textContent=tr().agenda; els.tabToday.textContent=tr().today; els.tabSummary.textContent=tr().summary;
  els.newTaskTitle.textContent=tr().newTask; els.labelTitle.textContent=tr().taskTitle; els.labelCategory.textContent=tr().category; els.labelDate.textContent=tr().date;
  els.labelTimeFrom.textContent=tr().timeFrom; els.labelTimeTo.textContent=tr().timeTo; els.labelNote.textContent=tr().note; els.saveTaskBtn.textContent=tr().saveTask;
  els.allTasksTitle.textContent=tr().allTasks; els.todayTasksTitle.textContent=tr().todayTasks; els.monthSummaryTitle.textContent=tr().monthSummary; els.labelSelectMonth.textContent=tr().selectMonth;
  els.overallStatusTitle.textContent=tr().overallStatus; els.categoryProgressTitle.textContent=tr().categoryProgress; els.dailyResultsTitle.textContent=tr().dailyResults;
  els.editTaskTitle.textContent=tr().edit; els.editLabelTitle.textContent=tr().taskTitle; els.editLabelCategory.textContent=tr().category; els.editLabelDate.textContent=tr().date;
  els.editLabelTimeFrom.textContent=tr().timeFrom; els.editLabelTimeTo.textContent=tr().timeTo; els.editLabelNote.textContent=tr().note; els.cancelEditBtn.textContent=tr().cancel; els.updateTaskBtn.textContent=tr().updateTask;
  fillCategories(els.categoryInput); fillCategories(els.editCategoryInput); els.languageSelect.value=state.settings.language;
}
function isOvernight(from,to){return !!(from && to && to < from);}
function validateTimes(from,to){
  if(!from || !to) return true;
  return from !== to;
}
function getTaskPayload(prefix='main'){
  if(prefix==='main'){
    return {title:els.titleInput.value.trim(), category:els.categoryInput.value, date:els.dateInput.value, timeFrom:els.timeFromInput.value||'', timeTo:els.timeToInput.value||'', note:els.noteInput.value.trim()};
  }
  return {title:els.editTitleInput.value.trim(), category:els.editCategoryInput.value, date:els.editDateInput.value, timeFrom:els.editTimeFromInput.value||'', timeTo:els.editTimeToInput.value||'', note:els.editNoteInput.value.trim()};
}
function clearMainForm(){els.titleInput.value=''; els.categoryInput.value=tr().categories[0]; els.dateInput.value=todayISO; els.timeFromInput.value=''; els.timeToInput.value=''; els.noteInput.value='';}
function addTask(){
  const payload=getTaskPayload('main');
  if(!payload.title) return alert(tr().writeTitle);
  if(!validateTimes(payload.timeFrom,payload.timeTo)) return alert(tr().invalidTime);
  state.tasks.unshift({id:Date.now().toString()+Math.random().toString(16).slice(2),...payload,done:false,createdAt:new Date().toISOString(),completedAt:null});
  persist(); clearMainForm(); renderAll(); setStatus(tr().taskSaved);
}
function toggleTask(id){state.tasks=state.tasks.map(task=>task.id===id?({...task,done:!task.done,completedAt:!task.done?new Date().toISOString():null}):task); persist(); renderAll();}
function deleteTask(id){state.tasks=state.tasks.filter(task=>task.id!==id); persist(); renderAll();}
function openEdit(id){const task=state.tasks.find(t=>t.id===id); if(!task) return; editingId=id; els.editTitleInput.value=task.title||''; els.editCategoryInput.value=task.category||tr().categories[0]; els.editDateInput.value=task.date||todayISO; els.editTimeFromInput.value=task.timeFrom||''; els.editTimeToInput.value=task.timeTo||''; els.editNoteInput.value=task.note||''; els.editModalBackdrop.classList.add('show');}
function closeEdit(){editingId=null; els.editModalBackdrop.classList.remove('show');}
function updateTask(){
  if(!editingId) return;
  const payload=getTaskPayload('edit');
  if(!payload.title) return alert(tr().writeTitle);
  if(!validateTimes(payload.timeFrom,payload.timeTo)) return alert(tr().invalidTime);
  state.tasks=state.tasks.map(task=>task.id===editingId?({...task,...payload}):task);
  persist(); closeEdit(); renderAll(); setStatus(tr().taskUpdated);
}
function repeatTask(id){const task=state.tasks.find(t=>t.id===id); if(!task) return; const newDate=prompt(tr().chooseDateRepeat,task.date||todayISO); if(!newDate) return; state.tasks.unshift({...task,id:Date.now().toString()+Math.random().toString(16).slice(2),date:newDate,done:false,completedAt:null,createdAt:new Date().toISOString()}); persist(); renderAll(); setStatus(tr().taskRepeated);}
function moveTask(id){const task=state.tasks.find(t=>t.id===id); if(!task) return; const newDate=prompt(tr().chooseDateMove,task.date||todayISO); if(!newDate) return; state.tasks=state.tasks.map(t=>t.id===id?({...t,date:newDate}):t); persist(); renderAll(); setStatus(tr().taskMoved);}
function saveBackup(){const payload={version:4,exportedAt:new Date().toISOString(),settings:state.settings,tasks:state.tasks}; const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='agenda_universal_backup_'+new Date().toISOString().slice(0,10)+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); setStatus(tr().backupSaved);}
function restoreBackup(file){const reader=new FileReader(); reader.onload=ev=>{try{const parsed=JSON.parse(ev.target.result); if(Array.isArray(parsed)){state.tasks=parsed;} else {if(Array.isArray(parsed.tasks)) state.tasks=parsed.tasks; if(parsed.settings) state.settings={...state.settings,...parsed.settings};} persist(); applyTheme(); applyTexts(); renderAll(); setStatus(tr().backupRestored);}catch{setStatus(tr().backupError,true);} finally {els.restoreFileInput.value='';}}; reader.readAsText(file);}
function agendaMonthValue(){return els.agendaMonthInput.value||todayISO.slice(0,7);}
function monthTasksFor(value){return state.tasks.filter(task=>(task.date||'').startsWith(value));}
function daysInMonth(monthValue){const [year,month]=monthValue.split('-').map(Number); return new Date(year,month,0).getDate();}
function monthDateString(monthValue,day){return `${monthValue}-${String(day).padStart(2,'0')}`;}
function formatTimeRange(task){
  if(task.timeFrom && task.timeTo){
    return isOvernight(task.timeFrom, task.timeTo) ? `${task.timeFrom} - ${task.timeTo} (${tr().overnight})` : `${task.timeFrom} - ${task.timeTo}`;
  }
  if(task.timeFrom) return `${task.timeFrom}`;
  return '';
}
function renderMonthlyAgenda(){
  const monthValue=agendaMonthValue(); const tasks=monthTasksFor(monthValue); const totalDays=daysInMonth(monthValue); const grouped={};
  tasks.forEach(task=>{grouped[task.date] ||= []; grouped[task.date].push(task);});
  Object.values(grouped).forEach(arr=>arr.sort((a,b)=>(a.timeFrom||'').localeCompare(b.timeFrom||'')));
  let html='';
  for(let day=1; day<=totalDays; day++){
    const dateStr=monthDateString(monthValue,day); const dayTasks=grouped[dateStr]||[];
    html+=`<div class="month-day-block"><div class="month-day-title">${tr().dayLabel} ${day} • ${escapeHtml(dateStr)}</div>`;
    if(!dayTasks.length){
      html+=`<div class="day-empty">${tr().noTaskDay}</div>`;
    } else {
      html+=dayTasks.map(task=>`<div class="day-task-card"><div><div class="${task.done?'done':''}"><strong>${escapeHtml(task.title)}</strong></div><div><span class="badge">${escapeHtml(task.category||'')}</span>${formatTimeRange(task)?`<span class="badge">${escapeHtml(formatTimeRange(task))}</span>`:''}${task.done?`<span class="badge badge-ok">${tr().completed}</span>`:''}</div>${task.note?`<div class="muted" style="margin-top:6px">${escapeHtml(task.note)}</div>`:''}</div><div class="task-actions"><button class="btn small ghost" onclick="openEdit('${task.id}')">${tr().edit}</button><button class="btn small ghost" onclick="repeatTask('${task.id}')">${tr().repeat}</button><button class="btn small secondary" onclick="moveTask('${task.id}')">${tr().move}</button><button class="btn small ${task.done?'ghost':''}" onclick="toggleTask('${task.id}')">${task.done?tr().unmark:tr().markDone}</button><button class="btn small delete" onclick="deleteTask('${task.id}')">${tr().delete}</button></div></div>`).join('');
    }
    html+=`</div>`;
  }
  els.monthlyAgendaList.innerHTML=html||`<div class="empty">${tr().noTasks}</div>`;
}
function renderToday(){
  const list=state.tasks.filter(task=>task.date===todayISO).sort((a,b)=>(a.timeFrom||'').localeCompare(b.timeFrom||''));
  if(!list.length){els.todayList.innerHTML=`<div class="empty">${tr().noTodayTasks}</div>`; return;}
  els.todayList.innerHTML=list.map(task=>`<div class="task"><div><strong>${escapeHtml(task.title)}</strong><div class="muted" style="margin-top:4px">${escapeHtml(task.category||'')}${formatTimeRange(task)?' • '+escapeHtml(formatTimeRange(task)):''}</div>${task.note?`<div class="muted" style="margin-top:6px">${escapeHtml(task.note)}</div>`:''}</div><div class="task-actions"><button class="btn small ${task.done?'ghost':'secondary'}" onclick="toggleTask('${task.id}')">${task.done?tr().unmark:tr().markDone}</button><button class="btn small ghost" onclick="openEdit('${task.id}')">${tr().edit}</button><button class="btn small secondary" onclick="moveTask('${task.id}')">${tr().move}</button></div></div>`).join('');
}
function renderSummary(){
  const month=els.monthInput.value; const monthTasks=monthTasksFor(month); const done=monthTasks.filter(t=>t.done).length; const pending=monthTasks.filter(t=>!t.done).length; const total=monthTasks.length; const rate=total?Math.round(done*100/total):0;
  els.completionRate.textContent=rate+'%'; els.completionText.textContent=`${done} ${tr().of} ${total} ${tr().completedText}`; els.mainProgress.style.width=rate+'%';
  const categories={}; monthTasks.forEach(task=>{categories[task.category] ||= {total:0,done:0}; categories[task.category].total++; if(task.done) categories[task.category].done++;});
  const colors=['#2eb67d','#d14d8b','#f59e0b','#8b5cf6','#14b8a6','#ef476f']; const entries=Object.entries(categories);
  els.categorySummary.innerHTML=!entries.length?`<div class="empty">${tr().noCategories}</div>`:entries.map(([name,val],i)=>{const percent=val.total?Math.round(val.done*100/val.total):0; return `<div class="category-item"><div class="line"><div><strong>${escapeHtml(name)}</strong><br><span class="muted">${val.done} ${tr().of} ${val.total}</span></div><strong>${percent}%</strong></div><div class="mini-bar"><div class="mini-fill" style="width:${percent}%;background:${colors[i%colors.length]}"></div></div></div>`;}).join('');
  const days={}; monthTasks.forEach(task=>{days[task.date] ||= {total:0,done:0}; days[task.date].total++; if(task.done) days[task.date].done++;});
  const dayEntries=Object.entries(days).sort((a,b)=>a[0].localeCompare(b[0]));
  els.dailySummary.innerHTML=!dayEntries.length?`<div class="empty">${tr().noDailyResults}</div>`:dayEntries.map(([date,val])=>{const percent=val.total?Math.round(val.done*100/val.total):0; const color=percent>=80?'var(--good)':percent>=50?'var(--warn)':'var(--danger)'; return `<div class="day-item"><div class="line"><strong>${escapeHtml(date)}</strong><span class="muted">${val.done}/${val.total}</span></div><div class="mini-bar"><div class="mini-fill" style="width:${percent}%;background:${color}"></div></div><div class="muted" style="margin-top:6px">${tr().compliance}: ${percent}%</div></div>`;}).join('');
  drawPie(done,pending);
}
function drawPie(done,pending){const ctx=els.pieChart.getContext('2d'); ctx.clearRect(0,0,els.pieChart.width,els.pieChart.height); const total=done+pending; if(!total){ctx.fillStyle=getCss('--muted'); ctx.font='15px Arial'; ctx.fillText(tr().noMonthData,80,120); return;} const cx=105,cy=110,r=72; let start=-Math.PI/2; [{label:tr().donePlural,value:done,color:getCss('--good')},{label:tr().pending,value:pending,color:getCss('--danger')}].filter(s=>s.value>0).forEach(slice=>{const angle=(slice.value/total)*Math.PI*2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+angle); ctx.closePath(); ctx.fillStyle=slice.color; ctx.fill(); start+=angle;}); ctx.fillStyle=getCss('--text'); ctx.font='bold 15px Arial'; ctx.fillText(`${tr().total}: ${total}`,78,115); ctx.fillStyle=getCss('--good'); ctx.fillRect(215,66,16,16); ctx.fillStyle=getCss('--text'); ctx.font='13px Arial'; ctx.fillText(`${tr().donePlural}: ${done}`,238,79); ctx.fillStyle=getCss('--danger'); ctx.fillRect(215,100,16,16); ctx.fillStyle=getCss('--text'); ctx.fillText(`${tr().pending}: ${pending}`,238,113);}
function getCss(v){return getComputedStyle(document.body).getPropertyValue(v).trim()||getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function escapeHtml(text){return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function renderAll(){renderMonthlyAgenda(); renderToday(); renderSummary();}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');}));
els.languageSelect.addEventListener('change',()=>{state.settings.language=els.languageSelect.value; persist(); applyTexts(); clearMainForm(); renderAll();});
els.themeSelect.addEventListener('change',()=>{state.settings.theme=els.themeSelect.value; persist(); applyTheme(); renderAll();});
els.saveTaskBtn.addEventListener('click',addTask);
els.saveBackupBtn.addEventListener('click',saveBackup);
els.restoreBackupBtn.addEventListener('click',()=>els.restoreFileInput.click());
els.restoreFileInput.addEventListener('change',e=>{const file=e.target.files&&e.target.files[0]; if(file) restoreBackup(file);});
els.agendaMonthInput.addEventListener('change',renderMonthlyAgenda);
els.monthInput.addEventListener('change',renderSummary);
els.cancelEditBtn.addEventListener('click',closeEdit);
els.updateTaskBtn.addEventListener('click',updateTask);
els.editModalBackdrop.addEventListener('click',e=>{if(e.target===els.editModalBackdrop) closeEdit();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault(); deferredPrompt=e; els.installBtn.style.display='inline-block'; els.installBox.classList.add('show');});
els.installBtn.addEventListener('click',async()=>{if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; els.installBtn.style.display='none'; els.installBox.classList.remove('show');});
window.toggleTask=toggleTask; window.deleteTask=deleteTask; window.openEdit=openEdit; window.repeatTask=repeatTask; window.moveTask=moveTask;
load(); els.dateInput.value=todayISO; els.monthInput.value=todayISO.slice(0,7); els.agendaMonthInput.value=todayISO.slice(0,7); applyTheme(); applyTexts(); clearMainForm(); renderAll();
</script>
</body>
</html>
